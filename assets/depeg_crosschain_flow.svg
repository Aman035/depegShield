<svg width="100%" viewBox="0 0 680 503" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pulse-red {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.6; }
  }
  @keyframes pulse-purple {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes flow-down {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -16; }
  }
  @keyframes flow-diag-monitor {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -20; }
  }
  @keyframes flow-diag-uni {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -20; }
  }
  @keyframes flow-diag-base {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -20; }
  }
  @keyframes dot-to-monitor {
    0% { transform: translate(0px, 0px); opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translate(57px, 43px); opacity: 0; }
  }
  @keyframes dot-to-uni {
    0% { transform: translate(0px, 0px); opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translate(57px, -50px); opacity: 0; }
  }
  @keyframes dot-to-base {
    0% { transform: translate(0px, 0px); opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translate(57px, 83px); opacity: 0; }
  }
  @keyframes hook-activate {
    0%, 60% { opacity: 0.3; }
    70%, 100% { opacity: 1; }
  }
  @keyframes shield-glow {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }
  @keyframes depeg-flash {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes network-pulse {
    0%, 100% { stroke-opacity: 0.3; }
    50% { stroke-opacity: 0.8; }
  }
  .red-glow { animation: pulse-red 2s ease-in-out infinite; }
  .purple-glow { animation: pulse-purple 3s ease-in-out infinite; }
  .flow-depeg { animation: flow-down 0.6s linear infinite; }
  .flow-to-reactive { animation: flow-diag-monitor 0.7s linear infinite; }
  .flow-to-uni { animation: flow-diag-uni 0.7s linear 0.3s infinite; }
  .flow-to-base { animation: flow-diag-base 0.7s linear 0.5s infinite; }
  .dot-monitor-1 { animation: dot-to-monitor 2s ease-in-out infinite; }
  .dot-monitor-2 { animation: dot-to-monitor 2s ease-in-out 0.7s infinite; }
  .dot-monitor-3 { animation: dot-to-monitor 2s ease-in-out 1.4s infinite; }
  .dot-uni-1 { animation: dot-to-uni 1.8s ease-in-out 0.2s infinite; }
  .dot-uni-2 { animation: dot-to-uni 1.8s ease-in-out 0.8s infinite; }
  .dot-uni-3 { animation: dot-to-uni 1.8s ease-in-out 1.4s infinite; }
  .dot-base-1 { animation: dot-to-base 1.8s ease-in-out 0.4s infinite; }
  .dot-base-2 { animation: dot-to-base 1.8s ease-in-out 1.0s infinite; }
  .dot-base-3 { animation: dot-to-base 1.8s ease-in-out 1.6s infinite; }
  .hook-fade { animation: hook-activate 4s ease-in-out infinite; }
  .shield-glow { animation: shield-glow 2s ease-in-out infinite; }
  .depeg-text { animation: depeg-flash 1.5s ease-in-out infinite; }
  .net-border { animation: network-pulse 3s ease-in-out infinite; }
</style>

<!-- ETHEREUM (left) -->
<text x="112" y="42" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">Ethereum</text>

<rect x="44" y="56" width="136" height="52" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="112" y="78" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">USDC/USDT pool</text>
<text x="112" y="96" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="400">imbalance 67%</text>

<!-- Warning dot (pulsing) -->
<circle cx="180" cy="82" r="12" fill="rgb(226,75,74)" class="red-glow"/>
<circle cx="180" cy="82" r="5" fill="rgb(226,75,74)" opacity="0.8"/>

<!-- Pool to Monitor arrow (vertical down, red, animated dashes) -->
<line x1="112" y1="108" x2="112" y2="142" stroke="rgb(226,75,74)" stroke-width="1.5" stroke-dasharray="4,4" class="flow-depeg"/>
<polygon points="112,148 108,140 116,140" fill="rgb(226,75,74)"/>
<text x="128" y="132" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="500" class="depeg-text">depeg!</text>

<!-- ReactiveMonitor -->
<rect x="44" y="148" width="136" height="52" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="112" y="170" text-anchor="middle" fill="rgb(206,203,246)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">ReactiveMonitor</text>
<text x="112" y="188" text-anchor="middle" fill="rgb(175,169,236)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="400">decodes swap event</text>

<!-- Purple scanner glow on monitor -->
<circle cx="50" cy="155" r="6" fill="rgb(175,169,236)" class="purple-glow"/>

<!-- REACTIVE NETWORK (center) -->
<rect x="244" y="190" width="192" height="64" rx="10" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="1" class="net-border"/>
<text x="340" y="216" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">Reactive Network</text>
<text x="340" y="236" text-anchor="middle" fill="rgb(180,178,169)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="400">cross-chain message relay</text>

<!-- Monitor to Reactive arrow (diagonal, purple dashed, animated) -->
<path d="M180 174 L237 217" fill="none" stroke="rgb(83,74,183)" stroke-width="1.5" stroke-dasharray="6,4" class="flow-to-reactive"/>
<polygon points="244,222 235,220 239,214" fill="rgb(83,74,183)"/>

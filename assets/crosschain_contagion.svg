<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pulse-red {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.55; }
  }
  @keyframes pulse-green {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
  @keyframes flow-upper {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -24; }
  }
  @keyframes flow-lower {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -24; }
  }
  @keyframes dot-upper {
    0% { transform: translate(0px, 0px); opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { transform: translate(270px, -58px); opacity: 0; }
  }
  @keyframes dot-lower {
    0% { transform: translate(0px, 0px); opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { transform: translate(270px, 62px); opacity: 0; }
  }
  @keyframes drain-top {
    0%, 60% { opacity: 0; }
    70%, 100% { opacity: 1; }
  }
  @keyframes drain-bottom {
    0%, 70% { opacity: 0; }
    80%, 100% { opacity: 1; }
  }
  .glow-red { animation: pulse-red 2s ease-in-out infinite; }
  .glow-green-1 { animation: pulse-green 2.5s ease-in-out infinite; }
  .glow-green-2 { animation: pulse-green 2.5s ease-in-out 0.4s infinite; }
  .flow-path-upper { animation: flow-upper 0.8s linear infinite; }
  .flow-path-lower { animation: flow-lower 0.8s linear 0.3s infinite; }
  .travel-dot-upper-1 { animation: dot-upper 2.5s ease-in-out infinite; }
  .travel-dot-upper-2 { animation: dot-upper 2.5s ease-in-out 0.8s infinite; }
  .travel-dot-upper-3 { animation: dot-upper 2.5s ease-in-out 1.6s infinite; }
  .travel-dot-lower-1 { animation: dot-lower 2.5s ease-in-out 0.5s infinite; }
  .travel-dot-lower-2 { animation: dot-lower 2.5s ease-in-out 1.3s infinite; }
  .travel-dot-lower-3 { animation: dot-lower 2.5s ease-in-out 2.1s infinite; }
  .drain-label-top { animation: drain-top 4s ease-in-out infinite; }
  .drain-label-bottom { animation: drain-bottom 4s ease-in-out infinite; }
</style>

<!-- ==================== ETHEREUM (left) ==================== -->
<text x="120" y="30" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="15" font-weight="600">Ethereum</text>

<!-- Pool box (red = depegging) -->
<rect x="32" y="72" width="176" height="76" rx="8" fill="rgb(68,68,65)" stroke="rgb(226,75,74)" stroke-width="1"/>
<text x="120" y="96" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">USDC / USDT</text>

<!-- Price tag -->
<rect x="72" y="106" width="96" height="24" rx="4" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="120" y="123" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="600">USDC at $0.87</text>

<!-- Red pulsing glow -->
<circle cx="196" cy="82" r="12" fill="rgb(226,75,74)" class="glow-red"/>
<circle cx="196" cy="82" r="5" fill="rgb(226,75,74)" opacity="0.8"/>

<!-- Crisis label -->
<rect x="56" y="44" width="56" height="20" rx="4" fill="rgb(113,43,19)" stroke="rgb(226,75,74)" stroke-width="0.5"/>
<text x="84" y="58" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="600">CRISIS</text>

<!-- Imbalance bar -->
<rect x="52" y="156" width="100" height="5" rx="2.5" fill="rgb(226,75,74)" opacity="0.7"/>
<rect x="152" y="156" width="36" height="5" rx="2.5" fill="rgb(93,202,165)" opacity="0.4"/>
<text x="120" y="174" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">85% / 15% imbalance</text>

<!-- ==================== FLOW ARROWS (center) ==================== -->

<!-- Upper flow path: Ethereum to Base -->
<path d="M208 100 L478 42" fill="none" stroke="rgb(226,75,74)" stroke-width="1.5" stroke-dasharray="8,4" stroke-opacity="0.5" class="flow-path-upper"/>

<!-- Traveling dots upper -->
<circle cx="208" cy="100" r="4" fill="rgb(226,75,74)" class="travel-dot-upper-1"/>
<circle cx="208" cy="100" r="4" fill="rgb(226,75,74)" class="travel-dot-upper-2"/>
<circle cx="208" cy="100" r="4" fill="rgb(226,75,74)" class="travel-dot-upper-3"/>

<!-- Upper arrowhead at Base end -->
<polygon points="484,40 474,37 476,45" fill="rgb(226,75,74)" opacity="0.7"/>

<!-- Flow label upper -->
<text x="340" y="56" text-anchor="middle" fill="rgb(240,153,123)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500" transform="rotate(-12,340,56)">arbs bridge depegging USDC</text>

<!-- Lower flow path: Ethereum to Unichain -->
<path d="M208 120 L478 182" fill="none" stroke="rgb(226,75,74)" stroke-width="1.5" stroke-dasharray="8,4" stroke-opacity="0.5" class="flow-path-lower"/>

<!-- Traveling dots lower -->
<circle cx="208" cy="120" r="4" fill="rgb(226,75,74)" class="travel-dot-lower-1"/>
<circle cx="208" cy="120" r="4" fill="rgb(226,75,74)" class="travel-dot-lower-2"/>
<circle cx="208" cy="120" r="4" fill="rgb(226,75,74)" class="travel-dot-lower-3"/>

<!-- Lower arrowhead at Unichain end -->
<polygon points="484,184 474,179 476,187" fill="rgb(226,75,74)" opacity="0.7"/>

<!-- Flow label lower -->
<text x="340" y="168" text-anchor="middle" fill="rgb(240,153,123)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500" transform="rotate(12,340,168)">arbs bridge depegging USDC</text>

<!-- ==================== BASE (right top) ==================== -->
<text x="560" y="18" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="15" font-weight="600">Base</text>

<!-- Pool box (green = looks balanced) -->
<rect x="472" y="28" width="176" height="76" rx="8" fill="rgb(68,68,65)" stroke="rgb(93,202,165)" stroke-width="1"/>
<text x="560" y="52" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">USDC / USDT</text>

<!-- Price tag (still at $1) -->
<rect x="512" y="62" width="96" height="24" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>

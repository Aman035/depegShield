<text x="560" y="126" text-anchor="middle" fill="rgb(180,178,169)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500">no signal</text>

<!-- Drain label (appears with delay) -->
<text x="560" y="148" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500" class="drain-label-top">USDT drained at par</text>

<!-- ==================== UNICHAIN (right bottom) ==================== -->
<text x="560" y="172" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="15" font-weight="600">Unichain</text>

<!-- Pool box (green = looks balanced) -->
<rect x="472" y="182" width="176" height="76" rx="8" fill="rgb(68,68,65)" stroke="rgb(93,202,165)" stroke-width="1"/>
<text x="560" y="206" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">USDC / USDT</text>

<!-- Price tag (still at $1) -->
<rect x="512" y="216" width="96" height="24" rx="4" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="560" y="233" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="600">USDC at $1.00</text>

<!-- Green dot (looks healthy) -->
<circle cx="636" cy="192" r="5" fill="rgb(93,202,165)" class="glow-green-2"/>

<!-- "No signal" label -->
<rect x="522" y="266" width="76" height="20" rx="4" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="560" y="280" text-anchor="middle" fill="rgb(180,178,169)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500">no signal</text>

<!-- Drain label (appears with delay) -->
<text x="560" y="302" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500" class="drain-label-bottom">USDT drained at par</text>

<!-- ==================== BOTTOM CALLOUT ==================== -->
<rect x="120" y="330" width="440" height="36" rx="6" fill="rgb(68,68,65)" stroke="rgb(226,75,74)" stroke-width="0.5"/>
<text x="340" y="353" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Each chain is blind. Arbs drain one pool after another.</text>

</svg>

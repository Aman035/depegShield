<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(180,178,169)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(226,75,74)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="rgb(93,202,165)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ==================== LEFT SIDE: Balanced Pool ==================== -->

<!-- Section title -->
<text x="170" y="30" text-anchor="middle" fill="rgb(250, 249, 245)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="14px" font-weight="500">Balanced Pool</text>

<!-- Pool box -->
<rect x="102" y="90" width="136" height="64" rx="8" stroke-width="0.5" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)"/>
<text x="170" y="114" text-anchor="middle" fill="rgb(211, 209, 199)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="14px" font-weight="500">Pool</text>
<text x="170" y="134" text-anchor="middle" fill="rgb(180, 178, 169)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="12px" font-weight="400">50% / 50%</text>

<!-- tokenA arrow -->
<line x1="42" y1="104" x2="96" y2="104" stroke="rgb(180, 178, 169)" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
<text x="14" y="108" text-anchor="start" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">tokenA</text>

<!-- tokenA fee badge -->
<rect x="56" y="82" width="32" height="16" rx="4" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
<text x="72" y="93" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="10px" font-weight="500">1bp</text>

<!-- tokenB arrow -->
<line x1="42" y1="138" x2="96" y2="138" stroke="rgb(180, 178, 169)" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
<text x="14" y="142" text-anchor="start" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">tokenB</text>

<!-- tokenB fee badge -->
<rect x="56" y="116" width="32" height="16" rx="4" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
<text x="72" y="127" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="10px" font-weight="500">1bp</text>

<!-- Balance indicator bar -->
<rect x="120" y="162" width="50" height="6" rx="3" fill="rgb(93, 202, 165)" opacity="0.7"/>
<rect x="170" y="162" width="50" height="6" rx="3" fill="rgb(93, 202, 165)" opacity="0.7"/>

<!-- Caption -->
<text x="170" y="190" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">All swaps pay the same flat fee</text>

<!-- ==================== DIVIDER ==================== -->
<line x1="340" y1="20" x2="340" y2="280" stroke="rgb(68, 68, 65)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- ==================== RIGHT SIDE: Imbalanced Pool ==================== -->

<!-- Section title -->
<text x="510" y="30" text-anchor="middle" fill="rgb(250, 249, 245)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="14px" font-weight="500">Imbalanced Pool (3%+ depeg)</text>

<!-- Pool box -->
<rect x="442" y="90" width="136" height="64" rx="8" stroke-width="0.5" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)"/>
<text x="510" y="114" text-anchor="middle" fill="rgb(211, 209, 199)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="14px" font-weight="500">Pool</text>
<text x="510" y="134" text-anchor="middle" fill="rgb(180, 178, 169)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="12px" font-weight="400">65% / 35%</text>

<!-- tokenA arrow (worsening -- excess token) -->
<line x1="370" y1="104" x2="436" y2="104" stroke="rgb(226, 75, 74)" stroke-width="1.5" marker-end="url(#arrow-red)"/>
<text x="354" y="108" text-anchor="start" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">tokenA</text>

<!-- tokenA fee badge (worsening) -->
<rect x="380" y="72" width="56" height="24" rx="4" fill="rgb(113, 43, 19)" stroke="rgb(240, 153, 123)" stroke-width="0.5"/>
<text x="408" y="86" text-anchor="middle" fill="rgb(226, 75, 74)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="600">50-200bp+</text>

<!-- worsening label -->
<text x="408" y="64" text-anchor="middle" fill="rgb(240, 153, 123)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="10px" font-weight="500">worsening</text>

<!-- tokenB arrow (rebalancing -- scarce token) -->
<line x1="370" y1="138" x2="436" y2="138" stroke="rgb(93, 202, 165)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<text x="354" y="142" text-anchor="start" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">tokenB</text>

<!-- tokenB fee badge (rebalancing) -->
<rect x="392" y="148" width="32" height="20" rx="4" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
<text x="408" y="162" text-anchor="middle" fill="rgb(93, 202, 165)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="600">0bp</text>

<!-- rebalancing label -->
<text x="408" y="180" text-anchor="middle" fill="rgb(93, 202, 165)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="10px" font-weight="500">rebalancing</text>

<!-- Imbalance indicator bar (skewed) -->
<rect x="462" y="162" width="65" height="6" rx="3" fill="rgb(226, 75, 74)" opacity="0.7"/>
<rect x="527" y="162" width="35" height="6" rx="3" fill="rgb(93, 202, 165)" opacity="0.5"/>

<!-- Warning dot on pool -->
<circle cx="578" cy="100" r="8" fill="rgb(226, 75, 74)" opacity="0.15"/>
<circle cx="578" cy="100" r="5" fill="rgb(226, 75, 74)" opacity="0.7"/>

<!-- Caption -->
<text x="510" y="190" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">Fees depend on swap direction</text>

<!-- ==================== LEGEND ==================== -->
<rect x="118" y="222" width="444" height="56" rx="8" fill="rgb(38, 38, 36)" stroke="rgb(68, 68, 65)" stroke-width="0.5"/>

<!-- Worsening legend -->
<rect x="140" y="237" width="10" height="10" rx="2" fill="rgb(113, 43, 19)" stroke="rgb(240, 153, 123)" stroke-width="0.5"/>
<text x="156" y="247" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">Worsening swap -- escalated fee (1-500bp)</text>

<!-- Rebalancing legend -->
<rect x="140" y="256" width="10" height="10" rx="2" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
<text x="156" y="266" fill="rgb(194, 192, 182)" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="11px" font-weight="400">Rebalancing swap -- zero fee (incentivizes recovery)</text>

</svg>
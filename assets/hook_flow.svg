<svg width="100%" viewBox="0 0 400 680" xmlns="http://www.w3.org/2000/svg">

<!-- 1. Swap Initiated (starting node) -->
<rect x="132" y="16" width="136" height="36" rx="18" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="200" y="39" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Swap Initiated</text>

<!-- Arrow 1 to 2 (down, gray) -->
<line x1="200" y1="52" x2="200" y2="66" stroke="rgb(180,178,169)" stroke-width="1.5"/>
<polygon points="200,72 196,64 204,64" fill="rgb(180,178,169)"/>

<!-- 2. beforeSwap() -->
<rect x="120" y="72" width="160" height="40" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="200" y="96" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">beforeSwap()</text>

<!-- Arrow 2 to 3 (down, green) -->
<line x1="200" y1="112" x2="200" y2="126" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<polygon points="200,132 196,124 204,124" fill="rgb(93,202,165)"/>

<!-- 3. Read Pool State -->
<rect x="108" y="132" width="184" height="50" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="200" y="154" text-anchor="middle" fill="rgb(206,203,246)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">Read Pool State</text>
<text x="200" y="172" text-anchor="middle" fill="rgb(175,169,236)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="400">sqrtPriceX96 + liquidity</text>

<!-- Arrow 3 to 4 (down, purple) -->
<line x1="200" y1="182" x2="200" y2="196" stroke="rgb(175,169,236)" stroke-width="1.5"/>
<polygon points="200,202 196,194 204,194" fill="rgb(175,169,236)"/>

<!-- 4. Compute Reserves & Ratio -->
<rect x="98" y="202" width="204" height="50" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="200" y="224" text-anchor="middle" fill="rgb(206,203,246)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">Compute Reserves &amp; Ratio</text>
<text x="200" y="242" text-anchor="middle" fill="rgb(175,169,236)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="400">ratio = max / min</text>

<!-- Arrow 4 to 5 (down, purple) -->
<line x1="200" y1="252" x2="200" y2="266" stroke="rgb(175,169,236)" stroke-width="1.5"/>
<polygon points="200,272 196,264 204,264" fill="rgb(175,169,236)"/>

<!-- 5. Check Cross-Chain Alerts -->
<rect x="98" y="272" width="204" height="50" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="200" y="294" text-anchor="middle" fill="rgb(245,196,179)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">Check Cross-Chain Alerts</text>
<text x="200" y="312" text-anchor="middle" fill="rgb(240,153,123)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="400">AlertReceiver</text>

<!-- Arrow 5 to 6 (down, orange) -->
<line x1="200" y1="322" x2="200" y2="342" stroke="rgb(240,153,123)" stroke-width="1.5"/>
<polygon points="200,348 196,340 204,340" fill="rgb(240,153,123)"/>

<!-- 6. Decision diamond: Swap Direction? -->
<polygon points="200,348 268,388 200,428 132,388" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="200" y="385" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">Swap</text>
<text x="200" y="398" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">Direction?</text>

<!-- 7. Left branch: Rebalancing -->
<line x1="132" y1="388" x2="60" y2="388" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<line x1="60" y1="388" x2="60" y2="450" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<polygon points="60,456 56,448 64,448" fill="rgb(93,202,165)"/>
<text x="82" y="374" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">rebalancing</text>

<rect x="4" y="456" width="112" height="48" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="60" y="477" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">0 bp (free)</text>
<text x="60" y="494" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">incentivize recovery</text>

<!-- 8. Right branch: Worsening -->
<line x1="268" y1="388" x2="340" y2="388" stroke="rgb(226,75,74)" stroke-width="1.5"/>
<line x1="340" y1="388" x2="340" y2="450" stroke="rgb(226,75,74)" stroke-width="1.5"/>
<polygon points="340,456 336,448 344,448" fill="rgb(226,75,74)"/>
<text x="318" y="374" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">worsening</text>

<rect x="276" y="456" width="128" height="48" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="340" y="477" text-anchor="middle" fill="rgb(245,196,179)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">FeeCurve(ratio)</text>
<text x="340" y="494" text-anchor="middle" fill="rgb(240,153,123)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">1 bp to 50% adaptive</text>

<!-- 9. Converge to Return Fee Override -->
<line x1="60" y1="504" x2="60" y2="540" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<line x1="60" y1="540" x2="132" y2="540" stroke="rgb(180,178,169)" stroke-width="1.5"/>
<line x1="340" y1="504" x2="340" y2="540" stroke="rgb(226,75,74)" stroke-width="1.5"/>
<line x1="340" y1="540" x2="268" y2="540" stroke="rgb(180,178,169)" stroke-width="1.5"/>

<rect x="120" y="524" width="160" height="36" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="200" y="547" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Return Fee Override</text>

<!-- Arrow 9 to 10 (down, gray) -->
<line x1="200" y1="560" x2="200" y2="574" stroke="rgb(180,178,169)" stroke-width="1.5"/>
<polygon points="200,580 196,572 204,572" fill="rgb(180,178,169)"/>

<!-- 10. afterSwap() -->
<rect x="108" y="580" width="184" height="50" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="200" y="602" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">afterSwap()</text>
<text x="200" y="620" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="400">emit SwapFeeApplied</text>

<!-- Legend -->
<rect x="4" y="648" width="10" height="10" rx="2" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="18" y="657" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">hook callback</text>
<rect x="100" y="648" width="10" height="10" rx="2" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="114" y="657" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">computation</text>
<rect x="196" y="648" width="10" height="10" rx="2" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="210" y="657" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">cross-chain / fee</text>
<rect x="306" y="648" width="10" height="10" rx="2" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="320" y="657" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">flow control</text>
</svg>

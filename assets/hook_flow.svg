<svg width="100%" viewBox="0 0 400 640" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pulse-green {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }
  @keyframes pulse-red {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }
  .glow-green { animation: pulse-green 2.5s ease-in-out infinite; }
  .glow-red { animation: pulse-red 2s ease-in-out infinite; }
</style>

<!-- 1. Swap Initiated -->
<rect x="132" y="12" width="136" height="36" rx="18" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="200" y="35" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Swap Initiated</text>

<!-- Arrow 1 to 2 -->
<line x1="200" y1="48" x2="200" y2="62" stroke="rgb(180,178,169)" stroke-width="1.5"/>
<polygon points="200,68 196,60 204,60" fill="rgb(180,178,169)"/>

<!-- 2. beforeSwap() -->
<rect x="120" y="68" width="160" height="36" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="200" y="90" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">beforeSwap()</text>
<circle cx="120" cy="86" r="5" fill="rgb(93,202,165)" class="glow-green"/>

<!-- Arrow 2 to 3 -->
<line x1="200" y1="104" x2="200" y2="118" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<polygon points="200,124 196,116 204,116" fill="rgb(93,202,165)"/>

<!-- 3. Derive Reserves + Ratio -->
<rect x="88" y="124" width="224" height="50" rx="8" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="200" y="146" text-anchor="middle" fill="rgb(206,203,246)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Derive Reserves + Ratio</text>
<text x="200" y="164" text-anchor="middle" fill="rgb(175,169,236)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">sqrtPriceX96, liquidity (no oracles)</text>

<!-- Arrow 3 to 4 -->
<line x1="200" y1="174" x2="200" y2="194" stroke="rgb(175,169,236)" stroke-width="1.5"/>
<polygon points="200,200 196,192 204,192" fill="rgb(175,169,236)"/>

<!-- 4. Decision diamond -->
<polygon points="200,200 268,240 200,280 132,240" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="200" y="237" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">Worsens</text>
<text x="200" y="250" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">Imbalance?</text>

<!-- 5a. Left branch: Rebalancing -->
<line x1="132" y1="240" x2="52" y2="240" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<line x1="52" y1="240" x2="52" y2="310" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<polygon points="52,316 48,308 56,308" fill="rgb(93,202,165)"/>
<text x="78" y="226" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500">no</text>

<rect x="4" y="316" width="96" height="44" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="52" y="336" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="600">0 bp</text>
<text x="52" y="352" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">free rebalancing</text>

<!-- 5b. Right branch: Worsening -->
<line x1="268" y1="240" x2="340" y2="240" stroke="rgb(226,75,74)" stroke-width="1.5"/>
<line x1="340" y1="240" x2="340" y2="310" stroke="rgb(226,75,74)" stroke-width="1.5"/>
<polygon points="340,316 336,308 344,308" fill="rgb(226,75,74)"/>
<text x="316" y="226" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="500">yes</text>

<rect x="272" y="316" width="136" height="44" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="340" y="336" text-anchor="middle" fill="rgb(245,196,179)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">FeeCurve(ratio)</text>
<text x="340" y="352" text-anchor="middle" fill="rgb(240,153,123)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">5 zones: 1bp to 50%</text>

<!-- 5c. Cross-chain floor (worsening only) -->
<line x1="340" y1="360" x2="340" y2="378" stroke="rgb(240,153,123)" stroke-width="1.5"/>
<polygon points="340,384 336,376 344,376" fill="rgb(240,153,123)"/>

<rect x="268" y="384" width="144" height="44" rx="8" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="340" y="404" text-anchor="middle" fill="rgb(245,196,179)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">Cross-Chain Floor</text>
<text x="340" y="420" text-anchor="middle" fill="rgb(240,153,123)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">max(local, AlertReceiver)</text>
<circle cx="268" cy="406" r="5" fill="rgb(240,153,123)" class="glow-red"/>

<!-- 6. Converge to Return Fee Override -->
<line x1="52" y1="360" x2="52" y2="480" stroke="rgb(93,202,165)" stroke-width="1.5"/>
<line x1="52" y1="480" x2="132" y2="480" stroke="rgb(180,178,169)" stroke-width="1.5"/>
<line x1="340" y1="428" x2="340" y2="480" stroke="rgb(226,75,74)" stroke-width="1.5"/>
<line x1="340" y1="480" x2="268" y2="480" stroke="rgb(180,178,169)" stroke-width="1.5"/>

<rect x="120" y="464" width="160" height="36" rx="8" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="200" y="487" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500">Return Fee Override</text>

<!-- Arrow 6 to 7 -->
<line x1="200" y1="500" x2="200" y2="518" stroke="rgb(180,178,169)" stroke-width="1.5"/>
<polygon points="200,524 196,516 204,516" fill="rgb(180,178,169)"/>

<!-- 7. afterSwap() -->
<rect x="108" y="524" width="184" height="44" rx="8" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="200" y="546" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="500">afterSwap()</text>
<text x="200" y="562" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400">emit SwapFeeApplied</text>
<circle cx="108" cy="536" r="5" fill="rgb(93,202,165)" class="glow-green"/>

<!-- Legend -->
<rect x="4" y="590" width="10" height="10" rx="2" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
<text x="18" y="599" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">hook callback</text>
<rect x="100" y="590" width="10" height="10" rx="2" fill="rgb(60,52,137)" stroke="rgb(175,169,236)" stroke-width="0.5"/>
<text x="114" y="599" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">computation</text>
<rect x="196" y="590" width="10" height="10" rx="2" fill="rgb(113,43,19)" stroke="rgb(240,153,123)" stroke-width="0.5"/>
<text x="210" y="599" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">fee / cross-chain</text>
<rect x="306" y="590" width="10" height="10" rx="2" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="320" y="599" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10">flow control</text>

</svg>

<svg width="100%" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes pulse-danger {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }
  @keyframes pulse-green {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes sweep-left {
    0% { width: 0; }
    30%, 100% { width: 194; }
  }
  @keyframes sweep-right {
    0%, 30% { width: 0; }
    60%, 100% { width: 194; }
  }
  @keyframes fee-text-left {
    0% { opacity: 0; }
    30%, 100% { opacity: 1; }
  }
  @keyframes fee-text-right {
    0%, 30% { opacity: 0; }
    60%, 100% { opacity: 1; }
  }
  @keyframes swap-arrow-left {
    0% { opacity: 0; transform: translateX(-12px); }
    15%, 100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes swap-arrow-right {
    0%, 15% { opacity: 0; transform: translateX(-12px); }
    35%, 100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes absorb-fade {
    0%, 55% { opacity: 0; }
    70%, 90% { opacity: 1; }
    100% { opacity: 0.7; }
  }
  @keyframes callout-pop {
    0%, 65% { opacity: 0; transform: scale(0.95); }
    80%, 100% { opacity: 1; transform: scale(1); }
  }
  @keyframes imbalance-grow {
    0%, 10% { width: 137; }
    40%, 100% { width: 195; }
  }
  @keyframes imbalance-shrink {
    0%, 10% { width: 137; x: 515; }
    40%, 100% { width: 79; x: 573; }
  }
  .danger-pulse { animation: pulse-danger 2s ease-in-out infinite; }
  .green-pulse { animation: pulse-green 2.5s ease-in-out infinite; }
  .fee-bar-left { animation: sweep-left 4s ease-out infinite; }
  .fee-bar-right { animation: sweep-right 4s ease-out infinite; }
  .fee-label-left { animation: fee-text-left 4s ease-out infinite; }
  .fee-label-right { animation: fee-text-right 4s ease-out infinite; }
  .swap-left { animation: swap-arrow-left 4s ease-out infinite; }
  .swap-right { animation: swap-arrow-right 4s ease-out infinite; }
  .absorb-text { animation: absorb-fade 4s ease-in-out infinite; }
  .callout-box { animation: callout-pop 4s ease-out infinite; }
  .imbalance-red { animation: imbalance-grow 4s ease-out infinite; }
  .imbalance-green { animation: imbalance-shrink 4s ease-out infinite; }
</style>

<!-- ==================== LEFT: Normal Market ==================== -->

<!-- Header -->
<text x="165" y="24" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="600">Normal Market</text>

<!-- Pool box (green) -->
<rect x="28" y="36" width="274" height="100" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>

<!-- Green status dot -->
<circle cx="56" cy="56" r="7" fill="rgb(93,202,165)" class="green-pulse"/>
<circle cx="56" cy="56" r="4" fill="rgb(93,202,165)"/>
<text x="68" y="60" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="500">BALANCED</text>

<!-- Pool info -->
<text x="165" y="74" text-anchor="middle" fill="rgb(159,225,203)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="400">USDC/USDT pool</text>

<!-- Balance bar -->
<rect x="108" y="80" width="56" height="4" rx="2" fill="rgb(93,202,165)" opacity="0.6"/>
<rect x="164" y="80" width="56" height="4" rx="2" fill="rgb(93,202,165)" opacity="0.6"/>
<text x="138" y="96" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">50%</text>
<text x="192" y="96" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">50%</text>

<!-- Swap arrow (animated slide-in) -->
<g class="swap-left">
  <text x="165" y="116" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Swap $5M USDC &#x2192; USDT</text>
</g>

<!-- Fee box (animated fill) -->
<rect x="68" y="126" width="194" height="6" rx="3" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
<rect x="68" y="126" width="194" height="6" rx="3" fill="rgb(93,202,165)" opacity="0.4" class="fee-bar-left"/>
<text x="165" y="148" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500" class="fee-label-left">Fee: 1bp &#x2192; $500</text>

<!-- ==================== CENTER DIVIDER ==================== -->
<line x1="340" y1="36" x2="340" y2="155" stroke="rgb(180,178,169)" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

<!-- VS pill -->
<rect x="325" y="80" width="30" height="22" rx="11" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
<text x="340" y="95" text-anchor="middle" fill="rgb(194,192,182)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="500">vs</text>

<!-- ==================== RIGHT: Active Depeg ==================== -->

<!-- Header -->
<text x="515" y="24" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="600">Active Depeg</text>

<!-- Pool box (red stroke) -->
<rect x="378" y="36" width="274" height="100" rx="8" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(226,75,74)"/>

<!-- Red pulsing glow + dot -->
<circle cx="406" cy="56" r="10" fill="rgb(226,75,74)" class="danger-pulse"/>
<circle cx="406" cy="56" r="4" fill="rgb(226,75,74)"/>
<text x="418" y="60" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="11" font-weight="500">CRISIS</text>

<!-- Pool info -->
<text x="515" y="74" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="400">USDC/USDT pool</text>

<!-- Imbalance bar (animated growing skew) -->
<rect x="448" y="80" width="137" height="4" rx="2" fill="rgb(226,75,74)" opacity="0.7" class="imbalance-red"/>
<rect x="585" y="80" width="67" height="4" rx="2" fill="rgb(93,202,165)" opacity="0.4"/>
<text x="490" y="96" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">85%</text>
<text x="618" y="96" text-anchor="middle" fill="rgb(93,202,165)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="9" font-weight="400">15%</text>

<!-- Swap arrow (animated slide-in, delayed) -->
<g class="swap-right">
  <text x="515" y="116" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="13" font-weight="500">Swap $5M USDC &#x2192; USDT</text>
</g>

<!-- Fee box (animated fill, delayed, same result) -->
<rect x="418" y="126" width="194" height="6" rx="3" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
<rect x="418" y="126" width="194" height="6" rx="3" fill="rgb(226,75,74)" opacity="0.4" class="fee-bar-right"/>
<text x="515" y="148" text-anchor="middle" fill="rgb(211,209,199)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="12" font-weight="500" class="fee-label-right">Fee: 1bp &#x2192; $500</text>

<!-- LP absorbs note (fades in last) -->
<text x="515" y="162" text-anchor="middle" fill="rgb(226,75,74)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="10" font-weight="400" class="absorb-text">LP absorbs $5M of a collapsing asset</text>

<!-- ==================== BOTTOM CALLOUT (pops in) ==================== -->
<g class="callout-box">
  <rect x="140" y="178" width="400" height="32" rx="6" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(226,75,74)"/>
  <text x="340" y="199" text-anchor="middle" fill="rgb(250,249,245)" font-family="'Anthropic Sans',-apple-system,system-ui,'Segoe UI',sans-serif" font-size="14" font-weight="600">Same fee. Wildly different risk.</text>
</g>

</svg>

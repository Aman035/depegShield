<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes growBar {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes drawLine {
    from { stroke-dashoffset: 600; }
    to { stroke-dashoffset: 0; }
  }
  .wave1 { animation: growBar 0.5s ease-out 0s forwards; transform-origin: bottom; transform: scaleY(0); }
  .wave2 { animation: growBar 0.5s ease-out 0.8s forwards; transform-origin: bottom; transform: scaleY(0); }
  .wave3 { animation: growBar 0.5s ease-out 1.6s forwards; transform-origin: bottom; transform: scaleY(0); }
  .wave4 { animation: growBar 0.5s ease-out 2.4s forwards; transform-origin: bottom; transform: scaleY(0); }
  .wave5 { animation: growBar 0.5s ease-out 3.2s forwards; transform-origin: bottom; transform: scaleY(0); }
  .label1 { animation: fadeIn 0.3s ease-out 0.3s forwards; opacity: 0; }
  .label2 { animation: fadeIn 0.3s ease-out 1.1s forwards; opacity: 0; }
  .label3 { animation: fadeIn 0.3s ease-out 1.9s forwards; opacity: 0; }
  .label4 { animation: fadeIn 0.3s ease-out 2.7s forwards; opacity: 0; }
  .label5 { animation: fadeIn 0.3s ease-out 3.5s forwards; opacity: 0; }
  .result-box { animation: fadeIn 0.6s ease-out 4.0s forwards; opacity: 0; }
  .ratio-line-red { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawLine 2.8s ease-in-out 0.2s forwards; }
  .ratio-line-green { stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawLine 0.8s ease-in-out 3.0s forwards; }
</style>

<!-- Title -->
<text x="340" y="20" text-anchor="middle" style="fill:rgb(250,249,245);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:14px;font-weight:500;">SVB/USDC Depeg Simulation -- March 2023</text>
<text x="340" y="34" text-anchor="middle" style="fill:rgb(194,192,182);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:11px;font-weight:400;">48-hour crisis and recovery</text>

<!-- Axes -->
<!-- Baseline at y=210, max bar area from y=60 to y=210 (150px height) -->
<line x1="50" y1="210" x2="560" y2="210" stroke="rgb(180,178,169)" stroke-width="0.5" opacity="0.4"/>

<!-- Y-axis label -->
<text x="18" y="60" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;font-weight:400;" transform="rotate(-90,18,130)">Swap Fee (bp)</text>

<!-- Y-axis ticks -->
<text x="44" y="213" text-anchor="end" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">0</text>
<line x1="46" y1="158" x2="560" y2="158" stroke="rgb(180,178,169)" stroke-width="0.3" opacity="0.2" stroke-dasharray="3 3"/>
<text x="44" y="161" text-anchor="end" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">100</text>
<line x1="46" y1="106" x2="560" y2="106" stroke="rgb(180,178,169)" stroke-width="0.3" opacity="0.2" stroke-dasharray="3 3"/>
<text x="44" y="109" text-anchor="end" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">200</text>

<!-- Wave columns: x centers at 100, 200, 300, 400, 500 -->
<!-- Each column: standard bar (gray, left) + depegshield bar (colored, right) -->
<!-- Bar width: 28px each, gap 6px between pair -->
<!-- Max fee = 287bp, map to 150px. Scale: 150/287 = 0.5226 px/bp -->

<!-- ===== WAVE 1: Early sells, 1.03x, std=1bp, ds=1bp ===== -->
<g class="label1">
  <text x="100" y="52" text-anchor="middle" style="fill:rgb(250,249,245);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:10px;font-weight:500;">Early sells</text>
</g>
<!-- Standard bar: 1bp = ~0.5px, min 2px for visibility -->
<g class="wave1">
  <rect x="75" y="208" width="22" height="2" rx="1" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
</g>
<!-- DepegShield bar: 1bp = 2px -->
<g class="wave1">
  <rect x="103" y="208" width="22" height="2" rx="1" fill="rgb(93,202,165)" stroke="rgb(93,202,165)" stroke-width="0.3"/>
</g>
<g class="label1">
  <text x="86" y="222" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1bp</text>
  <text x="114" y="222" text-anchor="middle" style="fill:rgb(93,202,165);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1bp</text>
  <text x="100" y="234" text-anchor="middle" style="fill:rgb(194,192,182);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">1.03x</text>
</g>

<!-- ===== WAVE 2: Panic builds, 1.07x, std=1bp, ds=50bp ===== -->
<g class="label2">
  <text x="200" y="52" text-anchor="middle" style="fill:rgb(250,249,245);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:10px;font-weight:500;">Panic builds</text>
</g>
<!-- Standard bar: 1bp = 2px -->
<g class="wave2">
  <rect x="175" y="208" width="22" height="2" rx="1" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
</g>
<!-- DepegShield bar: 50bp = 26px -->
<g class="wave2">
  <rect x="203" y="184" width="22" height="26" rx="2" fill="rgb(239,159,39)"/>
</g>
<g class="label2">
  <text x="186" y="222" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1bp</text>
  <text x="214" y="180" text-anchor="middle" style="fill:rgb(239,159,39);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">50bp</text>
  <text x="200" y="234" text-anchor="middle" style="fill:rgb(194,192,182);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">1.07x</text>
</g>

<!-- ===== WAVE 3: Peak crisis, 1.12x, std=1bp, ds=208bp ===== -->
<g class="label3">
  <text x="300" y="52" text-anchor="middle" style="fill:rgb(250,249,245);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:10px;font-weight:500;">Peak crisis</text>
</g>
<!-- Standard bar: 1bp = 2px -->
<g class="wave3">
  <rect x="275" y="208" width="22" height="2" rx="1" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
</g>
<!-- DepegShield bar: 208bp = 109px -->
<g class="wave3">
  <rect x="303" y="101" width="22" height="109" rx="2" fill="rgb(226,75,74)"/>
</g>
<g class="label3">
  <text x="286" y="222" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1bp</text>
  <text x="314" y="97" text-anchor="middle" style="fill:rgb(226,75,74);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">208bp</text>
  <text x="300" y="234" text-anchor="middle" style="fill:rgb(194,192,182);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">1.12x</text>
</g>

<!-- ===== WAVE 4: Late sellers, 1.15x, std=1bp, ds=287bp ===== -->
<g class="label4">
  <text x="400" y="52" text-anchor="middle" style="fill:rgb(250,249,245);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:10px;font-weight:500;">Late sellers</text>
</g>
<!-- Standard bar: 1bp = 2px -->
<g class="wave4">
  <rect x="375" y="208" width="22" height="2" rx="1" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
</g>
<!-- DepegShield bar: 287bp = 150px -->
<g class="wave4">
  <rect x="403" y="60" width="22" height="150" rx="2" fill="rgb(226,75,74)"/>
</g>
<g class="label4">
  <text x="386" y="222" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1bp</text>
  <text x="414" y="56" text-anchor="middle" style="fill:rgb(226,75,74);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">287bp</text>
  <text x="400" y="234" text-anchor="middle" style="fill:rgb(194,192,182);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">1.15x</text>
</g>

<!-- ===== WAVE 5: Recovery, ~1.03x, std=1bp, ds=0bp ===== -->
<g class="label5">
  <text x="500" y="52" text-anchor="middle" style="fill:rgb(250,249,245);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:10px;font-weight:500;">Recovery</text>
</g>
<!-- Standard bar: 1bp = 2px -->
<g class="wave5">
  <rect x="475" y="208" width="22" height="2" rx="1" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
</g>
<!-- DepegShield bar: 0bp - show a thin green outline to indicate "free" -->
<g class="wave5">
  <rect x="503" y="206" width="22" height="4" rx="1" fill="none" stroke="rgb(93,202,165)" stroke-width="0.8" stroke-dasharray="2 1"/>
</g>
<g class="label5">
  <text x="486" y="222" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1bp</text>
  <text x="514" y="222" text-anchor="middle" style="fill:rgb(93,202,165);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;font-weight:500;">0bp</text>
  <text x="514" y="200" text-anchor="middle" style="fill:rgb(93,202,165);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:7px;font-style:italic;">free rebalancing</text>
  <text x="500" y="234" text-anchor="middle" style="fill:rgb(194,192,182);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">~1.03x</text>
</g>

<!-- Ratio line chart overlay -->
<!-- Points: wave1(100,188) wave2(200,174) wave3(300,148) wave4(400,138) wave5(500,188) -->
<!-- Ratio mapping: 1.00x=210, 1.15x=60. Scale: (ratio-1.00)*1000px where 150/150=1px per 0.001 -->
<!-- 1.00->210, 1.03->210-0.03*1000=180, 1.07->210-0.07*1000=140, 1.12->210-0.12*1000=90, 1.15->210-0.15*1000=60, recovery 1.03->180 -->
<!-- Start from left edge at 1.00x -->
<polyline points="60,210 100,180 200,140 300,90 400,60" fill="none" stroke="rgb(226,75,74)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="ratio-line-red"/>
<polyline points="400,60 500,180" fill="none" stroke="rgb(93,202,165)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="ratio-line-green"/>

<!-- Ratio dots (appear with their wave) -->
<circle cx="60" cy="210" r="2.5" fill="rgb(194,192,182)" class="label1"/>
<circle cx="100" cy="180" r="2.5" fill="rgb(93,202,165)" class="label1"/>
<circle cx="200" cy="140" r="2.5" fill="rgb(239,159,39)" class="label2"/>
<circle cx="300" cy="90" r="2.5" fill="rgb(226,75,74)" class="label3"/>
<circle cx="400" cy="60" r="2.5" fill="rgb(226,75,74)" class="label4"/>
<circle cx="500" cy="180" r="2.5" fill="rgb(93,202,165)" class="label5"/>

<!-- Ratio labels on the line -->
<text x="60" y="206" text-anchor="middle" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;" class="label1">1.00x</text>

<!-- Right axis label -->
<text x="566" y="213" text-anchor="start" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1.00x</text>
<text x="566" y="63" text-anchor="start" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">1.15x</text>
<text x="566" y="138" text-anchor="start" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:8px;">ratio</text>

<!-- Result callout box -->
<g class="result-box">
  <rect x="176" y="248" width="328" height="28" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>
  <text x="340" y="266" text-anchor="middle" style="fill:rgb(93,202,165);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:13px;font-weight:600;">65x more fees earned by DepegShield LPs</text>
</g>

<!-- Legend -->
<g class="result-box">
  <rect x="60" y="248" width="10" height="10" rx="1" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.3"/>
  <text x="74" y="257" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">Standard</text>
  <rect x="114" y="248" width="10" height="10" rx="1" fill="rgb(226,75,74)"/>
  <text x="128" y="257" style="fill:rgb(180,178,169);font-family:'Anthropic Sans',-apple-system,'system-ui','Segoe UI',sans-serif;font-size:9px;">DepegShield</text>
</g>

</svg>
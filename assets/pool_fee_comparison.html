
<style>
  .wrap { font-family: var(--font-sans); color: var(--color-text-primary); padding: 8px 0; }
  .pools { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
  .pool-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 16px; }
  .pool-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; color: var(--color-text-secondary); }
  .pool-title span { font-size: 11px; font-weight: 400; margin-left: 6px; padding: 2px 8px; border-radius: 4px; }
  .bad-tag  { background: #FCEBEB; color: #A32D2D; }
  .good-tag { background: #E1F5EE; color: #085041; }
  .bar-wrap { display: flex; align-items: flex-end; gap: 6px; height: 120px; margin-bottom: 8px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; gap: 3px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.5s cubic-bezier(.4,0,.2,1), background 0.4s; min-height: 3px; }
  .bar-a { background: #1D9E75; }
  .bar-b { background: #185FA5; }
  .bar-label { font-size: 10px; color: var(--color-text-tertiary); text-align: center; }
  .bar-val { font-size: 11px; font-weight: 500; text-align: center; }
  .divider { width: 0.5px; background: var(--color-border-tertiary); height: 100%; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .stat { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 8px 10px; }
  .stat-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
  .stat-val { font-size: 15px; font-weight: 500; }
  .ratio-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .ratio-label { font-size: 13px; color: var(--color-text-secondary); min-width: 110px; }
  .ratio-track { flex: 1; height: 6px; background: var(--color-border-tertiary); border-radius: 3px; position: relative; }
  .ratio-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s; }
  .ratio-val { font-size: 13px; font-weight: 500; min-width: 52px; text-align: right; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 8px; padding: 7px 16px; font-size: 13px; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--color-background-tertiary); }
  .btn.primary { background: var(--color-background-primary); border-color: var(--color-border-primary); }
  .slider-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 180px; }
  .slider-wrap label { font-size: 12px; color: var(--color-text-tertiary); white-space: nowrap; }
  .zone-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; transition: background 0.4s, color 0.4s; }
  .fee-highlight { font-size: 18px; font-weight: 500; transition: color 0.4s; }
  .savings-row { margin-top: 12px; background: #E1F5EE; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .savings-label { font-size: 12px; color: #085041; }
  .savings-val { font-size: 14px; font-weight: 500; color: #085041; }
</style>

<div class="wrap">
  <div class="ratio-row">
    <span class="ratio-label">Pool imbalance</span>
    <div class="ratio-track"><div class="ratio-fill" id="rfill"></div></div>
    <span class="ratio-val" id="rval">1.000x</span>
    <span class="zone-badge" id="zbadge">Stable</span>
  </div>

  <div class="pools">
    <div class="pool-card">
      <div class="pool-title">Standard pool <span class="bad-tag">flat fee</span></div>
      <div class="bar-wrap" id="flat-bars"></div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">swap fee</div>
          <div class="fee-highlight" id="flat-fee" style="color:#185FA5">1bp</div>
        </div>
        <div class="stat">
          <div class="stat-label">LP protection</div>
          <div class="stat-val" style="color:#A32D2D">none</div>
        </div>
      </div>
    </div>

    <div class="pool-card">
      <div class="pool-title">DepegShield pool <span class="good-tag">dynamic fee</span></div>
      <div class="bar-wrap" id="shield-bars"></div>
      <div class="stats">
        <div class="stat">
          <div class="stat-label">swap fee</div>
          <div class="fee-highlight" id="shield-fee" style="color:#1D9E75">1bp</div>
        </div>
        <div class="stat">
          <div class="stat-label">direction</div>
          <div class="stat-val" id="direction-val">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="savings-row" id="savings-row" style="display:none">
    <span class="savings-label">LP earns extra vs flat fee</span>
    <span class="savings-val" id="savings-val"></span>
  </div>

  <div class="controls" style="margin-top:14px">
    <button class="btn primary" onclick="stepDown()">Sell token A (worsen)</button>
    <button class="btn" onclick="stepUp()">Buy token A (rebalance)</button>
    <button class="btn" onclick="reset()">Reset</button>
    <div class="slider-wrap">
      <label>swap size</label>
      <input type="range" min="1" max="5" value="2" id="step-size" step="1" style="flex:1">
      <span id="step-label" style="font-size:12px;color:var(--color-text-tertiary);min-width:20px">2%</span>
    </div>
  </div>
</div>

<script>
const ZONE1_UPPER = 10050;
const ZONE2_UPPER = 10100;
const ZONE3_UPPER = 10300;
const ZONE4_UPPER = 10500;
const ZONE5_MAX_D = 5000;
const BASE_FEE = 100;
const MAX_FEE = 500000;

function calcFee(ratio) {
  const r = Math.round(ratio * 10000);
  if (r <= ZONE1_UPPER) return BASE_FEE;
  let fee;
  if (r <= ZONE2_UPPER) {
    fee = BASE_FEE + (r - ZONE1_UPPER) * 8;
  } else if (r <= ZONE3_UPPER) {
    const d = r - ZONE2_UPPER;
    fee = 500 + (9 * d * d) / 80;
  } else if (r <= ZONE4_UPPER) {
    const d = r - ZONE3_UPPER;
    fee = 5000 + (3 * d * d) / 8;
  } else {
    const d = r - ZONE4_UPPER;
    if (d > ZONE5_MAX_D) return MAX_FEE;
    fee = 20000 + (d * d) / 50;
  }
  return Math.min(fee, MAX_FEE);
}

function feeStr(f) {
  if (f >= 100000) return (f / 10000).toFixed(1) + '%';
  return (f / 100).toFixed(f < 1000 ? 1 : 0) + 'bp';
}

function zoneName(ratio) {
  const r = Math.round(ratio * 10000);
  if (r <= ZONE1_UPPER) return ['Stable',    '#085041', '#E1F5EE'];
  if (r <= ZONE2_UPPER) return ['Drift',     '#27500A', '#EAF3DE'];
  if (r <= ZONE3_UPPER) return ['Stress',    '#633806', '#FAEEDA'];
  if (r <= ZONE4_UPPER) return ['Crisis',    '#712B13', '#FAECE7'];
  return                       ['Emergency', '#791F1F', '#FCEBEB'];
}

function barColor(ratio) {
  const r = Math.round(ratio * 10000);
  if (r <= ZONE1_UPPER) return '#1D9E75';
  if (r <= ZONE2_UPPER) return '#639922';
  if (r <= ZONE3_UPPER) return '#EF9F27';
  if (r <= ZONE4_UPPER) return '#D85A30';
  return '#E24B4A';
}

let ratio = 1.000;
let isWorsening = false;

const WAVES = [
  {label:'USDC', pct:50},
  {label:'USDT', pct:50},
];

function buildBars(containerId, ratioVal) {
  const container = document.getElementById(containerId);
  const usdcPct = Math.min(95, Math.max(5, 50 * (2 - ratioVal + 1) / 1)); 
  const totalRatio = ratioVal;
  const usdcShare = Math.round(100 / (1 + totalRatio - 1) * 100) / 100;
  const a = Math.max(5, Math.min(95, Math.round(50 / totalRatio * 10) / 10));
  const b = 100 - a;
  const maxH = 110;
  const aH = Math.round((a / 100) * maxH);
  const bH = Math.round((b / 100) * maxH);
  const col = barColor(ratioVal);
  container.innerHTML = `
    <div class="bar-col">
      <div class="bar-val" style="color:${a < 45 ? '#A32D2D' : 'var(--color-text-secondary)'}">${a.toFixed(0)}%</div>
      <div class="bar bar-a" style="height:${aH}px;background:${col}"></div>
      <div class="bar-label">USDC</div>
    </div>
    <div class="divider"></div>
    <div class="bar-col">
      <div class="bar-val" style="color:${b > 55 ? '#A32D2D' : 'var(--color-text-secondary)'}">${b.toFixed(0)}%</div>
      <div class="bar bar-b" style="height:${bH}px"></div>
      <div class="bar-label">USDT</div>
    </div>
  `;
}

function getPoolShares(r) {
  const a = Math.max(5, Math.min(95, Math.round(5000 / r) / 10));
  return [a, 100 - a];
}

function render() {
  const [zName, zText, zBg] = zoneName(ratio);
  const fee = calcFee(ratio);
  const flatFee = 100;

  const badge = document.getElementById('zbadge');
  badge.textContent = zName;
  badge.style.background = zBg;
  badge.style.color = zText;

  const rfill = document.getElementById('rfill');
  const pct = Math.min(100, ((ratio - 1.0) / 0.55) * 100);
  rfill.style.width = pct + '%';
  rfill.style.background = barColor(ratio);
  document.getElementById('rval').textContent = ratio.toFixed(4) + 'x';

  const [a, b] = getPoolShares(Math.round(ratio * 10000));
  const maxH = 110;
  const col = barColor(ratio);

  ['flat-bars', 'shield-bars'].forEach(id => {
    const aH = Math.max(4, Math.round((a / 100) * maxH));
    const bH = Math.max(4, Math.round((b / 100) * maxH));
    document.getElementById(id).innerHTML = `
      <div class="bar-col">
        <div class="bar-val" style="color:${a < 40 ? '#A32D2D' : 'var(--color-text-secondary)'}">${a.toFixed(0)}%</div>
        <div class="bar" style="height:${aH}px;background:${col};border-radius:4px 4px 0 0"></div>
        <div class="bar-label">USDC</div>
      </div>
      <div class="divider"></div>
      <div class="bar-col">
        <div class="bar-val" style="color:${b > 60 ? '#A32D2D' : 'var(--color-text-secondary)'}">${b.toFixed(0)}%</div>
        <div class="bar" style="height:${bH}px;background:#185FA5;border-radius:4px 4px 0 0"></div>
        <div class="bar-label">USDT</div>
      </div>
    `;
  });

  const flatEl = document.getElementById('flat-fee');
  flatEl.textContent = feeStr(flatFee);
  flatEl.style.color = '#185FA5';

  const shieldEl = document.getElementById('shield-fee');
  const dirEl = document.getElementById('direction-val');

  if (isWorsening) {
    shieldEl.textContent = feeStr(fee);
    shieldEl.style.color = barColor(ratio);
    dirEl.textContent = 'worsening';
    dirEl.style.color = '#A32D2D';
  } else {
    shieldEl.textContent = '0bp';
    shieldEl.style.color = '#1D9E75';
    dirEl.textContent = 'rebalancing';
    dirEl.style.color = '#085041';
  }

  const savingsRow = document.getElementById('savings-row');
  if (isWorsening && fee > flatFee) {
    savingsRow.style.display = 'flex';
    const mult = (fee / flatFee).toFixed(0);
    document.getElementById('savings-val').textContent = mult + '× more fee income vs flat pool';
  } else if (!isWorsening && ratio > 1.001) {
    savingsRow.style.display = 'flex';
    savingsRow.style.background = '#E6F1FB';
    document.getElementById('savings-val').style.color = '#0C447C';
    document.getElementById('savings-row').querySelector('.savings-label').style.color = '#0C447C';
    document.getElementById('savings-val').textContent = 'rebalancers pay 0bp — recovery incentivised';
  } else {
    savingsRow.style.display = 'none';
  }
}

function stepDown() {
  isWorsening = true;
  const step = parseInt(document.getElementById('step-size').value) * 0.005;
  ratio = Math.min(1.55, ratio + step);
  render();
}

function stepUp() {
  isWorsening = false;
  const step = parseInt(document.getElementById('step-size').value) * 0.005;
  ratio = Math.max(1.000, ratio - step);
  render();
}

function reset() {
  ratio = 1.000;
  isWorsening = false;
  document.getElementById('savings-row').style.background = '#E1F5EE';
  const sl = document.getElementById('savings-row').querySelector('.savings-label');
  if (sl) sl.style.color = '#085041';
  const sv = document.getElementById('savings-val');
  if (sv) sv.style.color = '#085041';
  render();
}

document.getElementById('step-size').oninput = function() {
  document.getElementById('step-label').textContent = this.value + '%';
};

render();
</script>

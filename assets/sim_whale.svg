<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<style>
  text {
    font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif;
  }
  @keyframes growBar {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes drawLine {
    from { stroke-dashoffset: 600; }
    to { stroke-dashoffset: 0; }
  }
  .bar-1 { animation: growBar 0.5s ease-out 0s forwards; transform-origin: bottom; transform: scaleY(0); }
  .bar-2 { animation: growBar 0.5s ease-out 0.7s forwards; transform-origin: bottom; transform: scaleY(0); }
  .bar-3 { animation: growBar 0.5s ease-out 1.4s forwards; transform-origin: bottom; transform: scaleY(0); }
  .bar-4 { animation: growBar 0.5s ease-out 2.1s forwards; transform-origin: bottom; transform: scaleY(0); }
  .bar-5 { animation: growBar 0.5s ease-out 2.8s forwards; transform-origin: bottom; transform: scaleY(0); }
  .label-1 { animation: fadeIn 0.3s ease-out 0.3s forwards; opacity: 0; }
  .label-2 { animation: fadeIn 0.3s ease-out 1.0s forwards; opacity: 0; }
  .label-3 { animation: fadeIn 0.3s ease-out 1.7s forwards; opacity: 0; }
  .label-4 { animation: fadeIn 0.3s ease-out 2.4s forwards; opacity: 0; }
  .label-5 { animation: fadeIn 0.3s ease-out 3.1s forwards; opacity: 0; }
  .ratio-line-up {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLine 2.5s ease-in-out 0.2s forwards;
  }
  .ratio-line-down {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawLine 0.8s ease-in-out 2.8s forwards;
  }
  .callout {
    animation: fadeIn 0.6s ease-out 3.5s forwards;
    opacity: 0;
  }
  .title-anim {
    animation: fadeIn 0.4s ease-out 0s forwards;
    opacity: 0;
  }
</style>

<!-- Title -->
<text x="340" y="22" text-anchor="middle" font-size="13" font-weight="500" fill="rgb(250,249,245)" class="title-anim">USDT Whale Attack Simulation (June 2023 -- Quick Recovery)</text>

<!-- Column positions: 80, 200, 320, 440, 560 -->
<!-- Bar chart area: y=42 (top labels) to y=190 (baseline) -->
<!-- Max bar height = 120px for 50bp -->

<!-- Axis baseline -->
<line x1="40" y1="190" x2="640" y2="190" stroke="rgb(180,178,169)" stroke-width="0.5" opacity="0.4"/>

<!-- Wave labels (top) -->
<text x="80" y="42" text-anchor="middle" font-size="11" font-weight="500" fill="rgb(194,192,182)" class="label-1">Tranche 1</text>
<text x="200" y="42" text-anchor="middle" font-size="11" font-weight="500" fill="rgb(194,192,182)" class="label-2">Tranche 2</text>
<text x="320" y="42" text-anchor="middle" font-size="11" font-weight="500" fill="rgb(194,192,182)" class="label-3">Tranche 3</text>
<text x="440" y="42" text-anchor="middle" font-size="11" font-weight="500" fill="rgb(194,192,182)" class="label-4">Tranche 4</text>
<text x="560" y="42" text-anchor="middle" font-size="11" font-weight="500" fill="rgb(194,192,182)" class="label-5">Recovery</text>

<!-- Ratio labels (below baseline) -->
<text x="80" y="206" text-anchor="middle" font-size="10" fill="rgb(180,178,169)" class="label-1">1.01x</text>
<text x="200" y="206" text-anchor="middle" font-size="10" fill="rgb(180,178,169)" class="label-2">1.02x</text>
<text x="320" y="206" text-anchor="middle" font-size="10" fill="rgb(180,178,169)" class="label-3">1.03x</text>
<text x="440" y="206" text-anchor="middle" font-size="10" fill="rgb(180,178,169)" class="label-4">1.04x</text>
<text x="560" y="206" text-anchor="middle" font-size="10" fill="rgb(180,178,169)" class="label-5">~1.01x</text>

<!-- Fee value labels above bars -->
<text x="72" y="57" text-anchor="middle" font-size="9" fill="rgb(180,178,169)" class="label-1">1bp</text>
<text x="88" y="57" text-anchor="middle" font-size="9" fill="rgb(93,202,165)" class="label-1">1bp</text>

<text x="192" y="57" text-anchor="middle" font-size="9" fill="rgb(180,178,169)" class="label-2">1bp</text>
<text x="208" y="57" text-anchor="middle" font-size="9" fill="rgb(239,159,39)" class="label-2">5bp</text>

<text x="312" y="57" text-anchor="middle" font-size="9" fill="rgb(180,178,169)" class="label-3">1bp</text>
<text x="328" y="57" text-anchor="middle" font-size="9" fill="rgb(216,90,48)" class="label-3">16bp</text>

<text x="432" y="57" text-anchor="middle" font-size="9" fill="rgb(180,178,169)" class="label-4">1bp</text>
<text x="448" y="57" text-anchor="middle" font-size="9" fill="rgb(226,75,74)" class="label-4">50bp</text>

<text x="552" y="57" text-anchor="middle" font-size="9" fill="rgb(180,178,169)" class="label-5">1bp</text>
<text x="568" y="57" text-anchor="middle" font-size="9" fill="rgb(93,202,165)" class="label-5">0bp</text>

<!-- BARS: Each column has a gray "Standard" bar (left) and colored "DepegShield" bar (right) -->
<!-- Heights: 1bp=2.4px, 5bp=12px, 16bp=38.4px, 50bp=120px, 0bp=0px -->

<!-- Tranche 1: Standard 1bp (gray), DepegShield 1bp (green) -->
<g class="bar-1">
  <rect x="66" y="187.6" width="12" height="2.4" rx="1" fill="rgb(100,100,97)"/>
  <rect x="82" y="187.6" width="12" height="2.4" rx="1" fill="rgb(93,202,165)"/>
</g>

<!-- Tranche 2: Standard 1bp (gray), DepegShield 5bp (yellow-orange) -->
<g class="bar-2">
  <rect x="186" y="187.6" width="12" height="2.4" rx="1" fill="rgb(100,100,97)"/>
  <rect x="202" y="178" width="12" height="12" rx="1" fill="rgb(239,159,39)"/>
</g>

<!-- Tranche 3: Standard 1bp (gray), DepegShield 16bp (orange) -->
<g class="bar-3">
  <rect x="306" y="187.6" width="12" height="2.4" rx="1" fill="rgb(100,100,97)"/>
  <rect x="322" y="151.6" width="12" height="38.4" rx="1" fill="rgb(216,90,48)"/>
</g>

<!-- Tranche 4: Standard 1bp (gray), DepegShield 50bp (red) -->
<g class="bar-4">
  <rect x="426" y="187.6" width="12" height="2.4" rx="1" fill="rgb(100,100,97)"/>
  <rect x="442" y="70" width="12" height="120" rx="1" fill="rgb(226,75,74)"/>
</g>

<!-- Recovery: Standard 1bp (gray), DepegShield 0bp (green, zero-height marker) -->
<g class="bar-5">
  <rect x="546" y="187.6" width="12" height="2.4" rx="1" fill="rgb(100,100,97)"/>
  <rect x="562" y="189" width="12" height="1" rx="0.5" fill="rgb(93,202,165)" opacity="0.5"/>
</g>

<!-- Ratio trajectory line (overlay) -->
<!-- Points: (80,182) 1.01x, (200,172) 1.02x, (320,162) 1.03x, (440,152) 1.04x -->
<!-- Map ratio to y: 1.00=190, each 0.01 = 10px up -->
<polyline points="80,180 200,170 320,160 440,150" fill="none" stroke="rgb(239,159,39)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="ratio-line-up"/>
<!-- Recovery segment -->
<polyline points="440,150 560,180" fill="none" stroke="rgb(93,202,165)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="ratio-line-down"/>

<!-- Ratio dots -->
<circle cx="80" cy="180" r="2.5" fill="rgb(239,159,39)" class="label-1"/>
<circle cx="200" cy="170" r="2.5" fill="rgb(239,159,39)" class="label-2"/>
<circle cx="320" cy="160" r="2.5" fill="rgb(216,90,48)" class="label-3"/>
<circle cx="440" cy="150" r="2.5" fill="rgb(226,75,74)" class="label-4"/>
<circle cx="560" cy="180" r="2.5" fill="rgb(93,202,165)" class="label-5"/>

<!-- Ratio axis label -->
<text x="650" y="168" text-anchor="start" font-size="9" fill="rgb(180,178,169)" opacity="0.6" class="label-1">ratio</text>

<!-- Legend -->
<rect x="80" y="218" width="8" height="8" rx="1" fill="rgb(100,100,97)"/>
<text x="92" y="225" font-size="10" fill="rgb(194,192,182)">Standard (1bp flat)</text>
<rect x="200" y="218" width="8" height="8" rx="1" fill="rgb(93,202,165)"/>
<text x="212" y="225" font-size="10" fill="rgb(194,192,182)">DepegShield (adaptive)</text>
<line x1="340" y1="218" x2="360" y2="218" stroke="rgb(239,159,39)" stroke-width="1.5"/>
<circle cx="350" cy="218" r="2" fill="rgb(239,159,39)"/>
<text x="366" y="222" font-size="10" fill="rgb(194,192,182)">Imbalance ratio</text>

<!-- Bottom callout -->
<g class="callout">
  <!-- Shield shape background -->
  <rect x="140" y="240" width="400" height="34" rx="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="0.5"/>

  <!-- Shield icon (small) -->
  <path d="M165,250 L165,261 C165,265 170,269 172,270 C174,269 179,265 179,261 L179,250 L172,248 Z" fill="none" stroke="rgb(93,202,165)" stroke-width="1" stroke-linejoin="round"/>
  <polyline points="168,258 171,261 176,254" fill="none" stroke="rgb(93,202,165)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="192" y="261" font-size="13" font-weight="500" fill="rgb(159,225,203)">18x more fees earned</text>
  <text x="370" y="261" font-size="13" fill="rgb(180,178,169)">|</text>
  <text x="386" y="261" font-size="13" font-weight="500" fill="rgb(226,75,74)">18x cost to attacker</text>
</g>

</svg>
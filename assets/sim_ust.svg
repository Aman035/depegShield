<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes bar1 { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes bar2 { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes bar3 { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes bar4 { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes capPulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes drawLine { from { stroke-dashoffset: 500; } to { stroke-dashoffset: 0; } }
    @keyframes glowPulse { 0% { opacity: 0.15; } 50% { opacity: 0.4; } 100% { opacity: 0.15; } }
  </style>

  <!-- Red arrow marker -->
  <marker id="arrow-ratio" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Glow filter for cap bars -->
  <filter id="capGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Background subtle danger gradient at bottom -->
<rect x="0" y="0" width="680" height="280" rx="0" fill="none"/>

<!-- Title -->
<text x="340" y="20" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="rgb(250, 249, 245)">UST/LUNA Collapse Simulation</text>
<text x="340" y="33" text-anchor="middle" font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" font-size="10" font-weight="400" fill="rgb(194, 192, 182)">May 2022 -- No Recovery</text>

<!-- ═══════════════════════════════════════════════ -->
<!-- BAR CHART SECTION: y=42 to y=185 -->
<!-- ═══════════════════════════════════════════════ -->

<!-- Baseline -->
<line x1="40" y1="170" x2="530" y2="170" stroke="rgb(68, 68, 65)" stroke-width="0.5"/>

<!-- Column positions: 95, 215, 335, 455 (center of each column) -->
<!-- Bar max height: 120px (from y=170 up to y=50) -->
<!-- Standard fee bars: always 1bp => 1px tall (minimum visible) -->
<!-- DepegShield bars: 1bp=1px, 254bp=6px, 5000bp=120px (cap) -->

<!-- ─── WAVE 1: Initial Panic ─── -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
  <!-- Wave label -->
  <text x="95" y="48" text-anchor="middle" font-size="9" font-weight="500" fill="rgb(240, 153, 123)">Initial Panic</text>

  <!-- Standard bar (gray, 1bp = 2px min visible) -->
  <rect x="78" y="168" width="14" height="2" rx="1" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.3">
    <animate attributeName="height" from="0" to="2" dur="0.4s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
    <animate attributeName="y" from="170" to="168" dur="0.4s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
  </rect>

  <!-- DepegShield bar (red, 1bp = 2px) -->
  <rect x="98" y="168" width="14" height="2" rx="1" fill="rgb(226, 75, 74)" stroke="rgb(240, 153, 123)" stroke-width="0.3">
    <animate attributeName="height" from="0" to="2" dur="0.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.15 1"/>
    <animate attributeName="y" from="170" to="168" dur="0.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.15 1"/>
  </rect>

  <!-- Fee labels -->
  <text x="85" y="180" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">1bp</text>
  <text x="105" y="180" text-anchor="middle" font-size="7" fill="rgb(240, 153, 123)">1bp</text>

  <!-- Ratio -->
  <text x="95" y="192" text-anchor="middle" font-size="8" font-weight="500" fill="rgb(194, 192, 182)">1.10x</text>
  <text x="95" y="200" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">10% depeg</text>
</g>

<!-- ─── WAVE 2: Cascade Sell ─── -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
  <text x="215" y="48" text-anchor="middle" font-size="9" font-weight="500" fill="rgb(240, 153, 123)">Cascade Sell</text>

  <!-- Standard bar -->
  <rect x="198" y="168" width="14" height="2" rx="1" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.3">
    <animate attributeName="height" from="0" to="2" dur="0.4s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
    <animate attributeName="y" from="170" to="168" dur="0.4s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
  </rect>

  <!-- DepegShield bar (254bp => ~6px relative to 5000bp=120px => 254/5000*120 = 6.1px) -->
  <rect x="218" y="164" width="14" height="6" rx="1" fill="rgb(226, 75, 74)" stroke="rgb(240, 153, 123)" stroke-width="0.3">
    <animate attributeName="height" from="0" to="6" dur="0.6s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.15 1"/>
    <animate attributeName="y" from="170" to="164" dur="0.6s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.15 1"/>
  </rect>

  <text x="205" y="180" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">1bp</text>
  <text x="225" y="180" text-anchor="middle" font-size="7" fill="rgb(240, 153, 123)">254bp</text>

  <text x="215" y="192" text-anchor="middle" font-size="8" font-weight="500" fill="rgb(194, 192, 182)">1.55x</text>
  <text x="215" y="200" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">36% depeg</text>
</g>

<!-- ─── WAVE 3: Death Spiral ─── -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
  <text x="335" y="48" text-anchor="middle" font-size="9" font-weight="600" fill="rgb(226, 75, 74)">Death Spiral</text>

  <!-- Standard bar -->
  <rect x="318" y="168" width="14" height="2" rx="1" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.3">
    <animate attributeName="height" from="0" to="2" dur="0.4s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
    <animate attributeName="y" from="170" to="168" dur="0.4s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
  </rect>

  <!-- DepegShield bar (5000bp = 50% cap => full 120px) with glow -->
  <rect x="338" y="50" width="14" height="120" rx="1" fill="rgb(226, 75, 74)" stroke="rgb(240, 153, 123)" stroke-width="0.3" filter="url(#capGlow)">
    <animate attributeName="height" from="0" to="120" dur="0.7s" begin="2.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.1 1"/>
    <animate attributeName="y" from="170" to="50" dur="0.7s" begin="2.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.1 1"/>
  </rect>
  <!-- Cap flash -->
  <rect x="335" y="47" width="20" height="126" rx="2" fill="rgb(226, 75, 74)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0" dur="0.4s" begin="3.0s" fill="freeze"/>
  </rect>

  <!-- CAP label -->
  <text x="345" y="46" text-anchor="middle" font-size="7" font-weight="600" fill="rgb(226, 75, 74)" opacity="0">
    50% CAP
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="3.3s" repeatCount="indefinite"/>
  </text>

  <text x="325" y="180" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">1bp</text>
  <text x="345" y="180" text-anchor="middle" font-size="7" fill="rgb(226, 75, 74)" font-weight="500">5000bp</text>

  <text x="335" y="192" text-anchor="middle" font-size="8" font-weight="500" fill="rgb(194, 192, 182)">2.23x</text>
  <text x="335" y="200" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">67% depeg</text>
</g>

<!-- ─── WAVE 4: Final Drain ─── -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
  <text x="455" y="48" text-anchor="middle" font-size="9" font-weight="600" fill="rgb(226, 75, 74)">Final Drain</text>

  <!-- Standard bar -->
  <rect x="438" y="168" width="14" height="2" rx="1" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.3">
    <animate attributeName="height" from="0" to="2" dur="0.4s" begin="3.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
    <animate attributeName="y" from="170" to="168" dur="0.4s" begin="3.2s" fill="freeze" calcMode="spline" keySplines="0 0 0.2 1"/>
  </rect>

  <!-- DepegShield bar (5000bp = 50% cap => full 120px) with glow -->
  <rect x="458" y="50" width="14" height="120" rx="1" fill="rgb(226, 75, 74)" stroke="rgb(240, 153, 123)" stroke-width="0.3" filter="url(#capGlow)">
    <animate attributeName="height" from="0" to="120" dur="0.7s" begin="3.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.1 1"/>
    <animate attributeName="y" from="170" to="50" dur="0.7s" begin="3.3s" fill="freeze" calcMode="spline" keySplines="0 0 0.1 1"/>
  </rect>
  <!-- Cap flash -->
  <rect x="455" y="47" width="20" height="126" rx="2" fill="rgb(226, 75, 74)" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0" dur="0.4s" begin="4.0s" fill="freeze"/>
  </rect>

  <!-- CAP label -->
  <text x="465" y="46" text-anchor="middle" font-size="7" font-weight="600" fill="rgb(226, 75, 74)" opacity="0">
    50% CAP
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="4.3s" repeatCount="indefinite"/>
  </text>

  <text x="445" y="180" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">1bp</text>
  <text x="465" y="180" text-anchor="middle" font-size="7" fill="rgb(226, 75, 74)" font-weight="500">5000bp</text>

  <text x="455" y="192" text-anchor="middle" font-size="8" font-weight="500" fill="rgb(194, 192, 182)">3.98x</text>
  <text x="455" y="200" text-anchor="middle" font-size="7" fill="rgb(180, 178, 169)">87% depeg</text>
</g>

<!-- Legend (small, right side) -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif">
  <rect x="555" y="55" width="8" height="8" rx="1" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.3"/>
  <text x="567" y="62" font-size="7" fill="rgb(180, 178, 169)">Standard Pool</text>
  <rect x="555" y="68" width="8" height="8" rx="1" fill="rgb(226, 75, 74)" stroke="rgb(240, 153, 123)" stroke-width="0.3"/>
  <text x="567" y="75" font-size="7" fill="rgb(240, 153, 123)">DepegShield</text>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!-- LINE CHART OVERLAY: Ratio trajectory -->
<!-- ═══════════════════════════════════════════════ -->
<!-- Points: wave1(95,155), wave2(215,131), wave3(335,87), wave4(455,30) -->
<!-- Mapping: ratio 1.0=170, 4.0=30 => y = 170 - (ratio-1.0)/3.0 * 140 -->
<!-- 1.10 => 170 - 0.1/3*140 = 165.3 -->
<!-- 1.55 => 170 - 0.55/3*140 = 144.3 -->
<!-- 2.23 => 170 - 1.23/3*140 = 112.6 -->
<!-- 3.98 => 170 - 2.98/3*140 = 30.9 -->

<g>
  <polyline points="95,165 215,144 335,113 455,31" fill="none" stroke="rgb(226, 75, 74)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="500" stroke-dashoffset="500" marker-end="url(#arrow-ratio)" opacity="0.8">
    <animate attributeName="stroke-dashoffset" from="500" to="0" dur="4s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </polyline>
  <!-- Dots at each data point -->
  <circle cx="95" cy="165" r="2.5" fill="rgb(226, 75, 74)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.2s" begin="0.5s" fill="freeze"/>
  </circle>
  <circle cx="215" cy="144" r="2.5" fill="rgb(226, 75, 74)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.2s" begin="1.5s" fill="freeze"/>
  </circle>
  <circle cx="335" cy="113" r="2.5" fill="rgb(226, 75, 74)" opacity="0">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.2s" begin="2.5s" fill="freeze"/>
  </circle>
  <circle cx="455" cy="31" r="3" fill="rgb(226, 75, 74)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.5s" fill="freeze"/>
    <animate attributeName="r" values="3;5;3" dur="1.5s" begin="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" begin="4s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Right-side ratio labels for the line -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" opacity="0">
  <animate attributeName="opacity" from="0" to="0.7" dur="0.5s" begin="4s" fill="freeze"/>
  <text x="525" y="168" font-size="7" fill="rgb(194, 192, 182)">1.0x</text>
  <text x="525" y="35" font-size="7" fill="rgb(226, 75, 74)" font-weight="500">3.98x</text>
  <!-- Dashed reference lines -->
  <line x1="520" y1="170" x2="530" y2="170" stroke="rgb(68, 68, 65)" stroke-width="0.5"/>
  <line x1="520" y1="31" x2="530" y2="31" stroke="rgb(68, 68, 65)" stroke-width="0.5" stroke-dasharray="2 2"/>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!-- BOTTOM CALLOUT -->
<!-- ═══════════════════════════════════════════════ -->

<!-- Divider line -->
<line x1="40" y1="212" x2="640" y2="212" stroke="rgb(68, 68, 65)" stroke-width="0.5" opacity="0">
  <animate attributeName="opacity" from="0" to="0.6" dur="0.5s" begin="4.5s" fill="freeze"/>
</line>

<!-- Result callout -->
<g font-family="'Anthropic Sans', -apple-system, 'system-ui', 'Segoe UI', sans-serif" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="4.8s" fill="freeze"/>

  <!-- Fee multiplier - amber/orange for bittersweet compensation -->
  <text x="340" y="232" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(239, 159, 39)">4,314x more fees earned</text>

  <!-- LP position loss - dim red -->
  <text x="340" y="249" text-anchor="middle" font-size="11" font-weight="500" fill="rgb(160, 70, 70)">LP position: $0 in both pools</text>

  <!-- Takeaway message -->
  <text x="340" y="269" text-anchor="middle" font-size="9" font-weight="400" fill="rgb(180, 178, 169)">Can't prevent total collapse. Can compensate LPs for absorbing the blow.</text>
</g>

<!-- Subtle pulsing danger glow behind the whole chart area -->
<rect x="35" y="45" width="500" height="130" rx="4" fill="rgb(226, 75, 74)" opacity="0">
  <animate attributeName="opacity" values="0;0;0.03;0.06;0.03" dur="6s" begin="0s" repeatCount="indefinite"/>
</rect>

</svg>